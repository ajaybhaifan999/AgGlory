<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% if owner %}Owner Login{% else %}FF Glory - Login{% endif %} | ffglory.pro</title>
<style>
:root{--bg:#0b0d14;--card:#141826;--accent:#ff5722;--text:#e8eaed;--muted:#8b91a1}
*{box-sizing:border-box;font-family:system-ui,Segoe UI,Roboto,sans-serif}
body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#1a1f33,#0b0d14);color:var(--text);display:grid;place-items:center;padding:20px}
.card{background:var(--card);padding:28px;border-radius:16px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
h1{margin:0 0 6px;font-size:22px}.sub{color:var(--muted);font-size:13px;margin-bottom:20px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;padding:8px;border-radius:8px;background:#1d2235;text-align:center;cursor:pointer;font-size:13px}
.tab.active{background:var(--accent)}
label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
input{width:100%;padding:11px;border-radius:8px;border:1px solid #2a3149;background:#0f1320;color:var(--text);font-size:14px}
button{width:100%;margin-top:18px;padding:12px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:14px}
.msg{margin-top:12px;font-size:13px;min-height:18px}
.err{color:#ff6b6b}.ok{color:#4ade80}
.owner-badge{background:#ffd700;color:#000;padding:3px 8px;border-radius:6px;font-size:11px;display:inline-block;margin-left:6px}
a{color:var(--accent);font-size:12px;text-decoration:none}
</style></head><body>
<div class="card">
  <h1>FF Glory {% if owner %}<span class="owner-badge">OWNER</span>{% endif %}</h1>
  <p class="sub">{% if owner %}Owner panel login{% else %}Login or create an account{% endif %}</p>

  {% if not owner %}
  <div class="tabs">
    <div class="tab active" data-tab="login">Login</div>
    <div class="tab" data-tab="register">Register</div>
  </div>
  {% endif %}

  <form id="frm">
    <label>Username</label>
    <input name="username" required>
    <label>Password</label>
    <input name="password" type="password" required>
    <button id="btn" type="submit">Continue</button>
    <div class="msg" id="msg"></div>
  </form>
  {% if not owner %}<p style="text-align:center;margin-top:12px"><a href="/owner/login">Owner login</a></p>{% else %}<p style="text-align:center;margin-top:12px"><a href="/login">User login</a></p>{% endif %}
</div>
<script>
let mode="login";
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active"); mode=t.dataset.tab;
  document.getElementById("btn").textContent=mode==="login"?"Login":"Register";
});
document.getElementById("frm").onsubmit=async e=>{
  e.preventDefault();
  const fd=new FormData(e.target);
  const body=JSON.stringify({username:fd.get("username"),password:fd.get("password")});
  const url= mode==="register" ? "/api/register" : "/api/login";
  const msg=document.getElementById("msg"); msg.textContent="..."; msg.className="msg";
  const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body});
  const j=await r.json();
  if(!j.ok){msg.textContent=j.error||"Failed";msg.className="msg err";return;}
  if(mode==="register"){msg.textContent="Registered. Now login.";msg.className="msg ok";
    document.querySelector('[data-tab="login"]').click();return;}
  msg.textContent="Success"; msg.className="msg ok";
  location.href=j.redirect||"/dashboard";
};
</script></body></html>
